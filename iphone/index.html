<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./main.css">
</head>
<body>
    <main class="site-main">
        <section class="site-section">
            <div class="container">
                <ul class="iphone-list">
                    <li class="iphone-item">
                        <img class="iphone-img" src="./images/image 3.png" alt="">
                        <img class="sale-img" src="./images/sale.png" alt="">
                        <div class="iphone-box">
                            <div class="info">
                                <h3 class="iphone-tittle">
                                    iPhone 11
                                </h3>
                                <p class="price">
                                    $349.99
                                </p>
                            </div>
                            <button class="icon-button">
                                <img class="icons-img" src="./images/Vector (3).png" alt="">
                            </button>
                        </div>
                    </li>
                     <li class="iphone-item">
                        <img class="iphone-img" src="./images/iphone12.png" alt="">
                        <img class="sale-img" src="./images/sale.png" alt="">
                        <div class="iphone-box">
                            <div class="info">
                                <h3 class="iphone-tittle">
                                    iPhone 13 pink
                                </h3>
                                <p class="price">
                                    $549.99
                                </p>
                            </div>
                            <button class="icon-button">
                                <img class="icons-img" src="./images/Vector (3).png" alt="">
                            </button>
                        </div>
                    </li>
                     <li class="iphone-item">
                        <img class="iphone-img" src="./images/iphone13.png" alt="">
                        <img class="sale-img" src="./images/sale.png" alt="">
                        <div class="iphone-box">
                            <div class="info">
                                <h3 class="iphone-tittle">
                                    iPhone 13 purple
                                </h3>
                                <p class="price">
                                    $549.99
                                </p>
                            </div>
                            <button class="icon-button">
                                <img class="icons-img" src="./images/Vector (3).png" alt="">
                            </button>
                        </div>
                    </li>
                </ul>
            </div>
        </section>
    </main>
</body>
</html>
